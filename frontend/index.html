<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Young Frida - Transaction Dashboard</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 40px;
      background: #f4f7f6;
    }

    h1 {
      color: #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    th,
    td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #007bff;
      color: white;
    }

    tr:hover {
      background-color: #f1f1f1;
    }

    .status-safe {
      color: green;
      font-weight: bold;
    }

    .status-fraud {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>Transaction Monitoring</h1>
  <button id="refreshBtn">Refresh Data</button>

  <table id="transactionTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Customer</th>
        <th>Country</th>
        <th>Location</th>
        <th>Amount</th>
        <th>Risk Score</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      </tbody>
  </table>

  <script src="app.js"></script>
</body>


</html>
