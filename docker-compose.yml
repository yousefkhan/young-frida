version: '3.8'

services:
  # Our custom Node.js application
  young-frida:
    build: .
    restart: always
    volumes:
      - ./frida0.db:/app/frida0.db

  nginx:
    image: nginx:latest
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./test-app01.crt:/etc/nginx/ssl/test-app01.crt
      - ./test-app01.key:/etc/nginx/ssl/test-app01.key
    ports:         
      - "80:80"
      - "443:443"
    depends_on:
      - young-frida
